<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>Prozess-Simulator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/DiTi_Logo.jpg') }}">
</head>
<body>
<header class="app-header">
    <div class="logo-row">
        <a href="{{ url_for('main.dashboard') }}" class="logo-left">
            <img src="{{ url_for('static', filename='img/eJustice_Logo_Original_Web.png') }}" alt="eJustice.ch">
        </a>

        <div class="app-title">
            <h1>Prozess-Simulator</h1>
            <nav>
                <a href="{{ url_for('main.dashboard') }}">Dashboard</a>
                <a href="{{ url_for('organization.organization') }}">Organisation</a>

                {% if endpoint_exists('process.process_map') %}
                    <a href="{{ url_for('process.process_map') }}">Prozesslandkarte</a>
                {% endif %}

                {% if endpoint_exists('process.process_list') %}
                    <a href="{{ url_for('process.process_list') }}">Prozesse</a>
                {% endif %}

                {% if endpoint_exists('process.simulation') %}
                    <a href="{{ url_for('process.simulation') }}">Simulation</a>
                {% endif %}
            </nav>
        </div>

        <a href="{{ url_for('main.dashboard') }}" class="logo-right">
            <img src="{{ url_for('static', filename='img/DiTi_Logo.jpg') }}" alt="DiTi">
        </a>
    </div>
</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
