{% extends "base.html" %}
{% block content %}
<p><a href="{{ url_for('organization.organization') }}">← Zurück zur Organisation</a></p>
<h2>Funktion bearbeiten</h2>
<form method="post" class="form-card">
    <label>Name
        <input name="name" value="{{ function.name or '' }}" required>
    </label>
    <label>Beschreibung
        <textarea name="description">{{ function.description or '' }}</textarea>
    </label>
    <button type="submit">Speichern</button>
</form>
{% endblock %}
