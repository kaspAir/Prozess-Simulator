{% extends "base.html" %}
{% block content %}
<h2>Node bearbeiten – {{ process.name }}</h2>

<form method="post" class="form-card">
    <label>Name
        <input name="name" value="{{ node.name or '' }}" required>
    </label>

    <label>Typ
        <select name="type">
            {% for t in ["start", "task", "xor", "subprocess", "end"] %}
                <option value="{{ t }}" {% if node.type == t %}selected{% endif %}>{{ t }}</option>
            {% endfor %}
        </select>
    </label>

    <label>Aufwand in Minuten
        <input name="effort_minutes" type="number" step="0.1" value="{{ node.effort_minutes or 0 }}">
    </label>

    <label>Sortierung
        <input name="sort_order" type="number" value="{{ node.sort_order or 0 }}">
    </label>

    <label>Rechtsgrundlage
        <textarea name="legal_basis">{{ node.legal_basis or '' }}</textarea>
    </label>

    <label>Verknüpfter Subprozess
        <select name="subprocess_id">
            <option value="">kein Subprozess</option>
            {% for sp in subprocesses %}
                <option value="{{ sp.id }}" {% if node.subprocess_id == sp.id %}selected{% endif %}>{{ sp.name }}</option>
            {% endfor %}
        </select>
    </label>

    <fieldset>
        <legend>Ausführende Rollen</legend>
        {% for role in roles %}
            <label class="check">
                <input type="checkbox" name="role_ids" value="{{ role.id }}" {% if role in node.roles %}checked{% endif %}>
                {{ role.name }}
            </label>
        {% endfor %}
    </fieldset>

    <button type="submit">Speichern</button>
</form>

{% if node.id %}
<form method="post" action="{{ url_for('node_delete', process_id=process.id, node_id=node.id) }}">
    <button class="danger" type="submit">Node löschen</button>
</form>
{% endif %}
{% endblock %}
