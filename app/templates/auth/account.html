{% extends "base.html" %}
{% block content %}
<div style="max-width:420px;margin:0 auto;padding:0 16px;">
  <h2>Mein Konto</h2>
  <p>{{ current_user.name }} · {{ current_user.email }}</p>

  <h3>Passwort ändern</h3>
  <form method="post" action="{{ url_for('auth.account') }}">
    <label>Aktuelles Passwort<br>
      <input type="password" name="current_password" required style="width:100%;padding:8px;margin:4px 0 12px;">
    </label>
    <label>Neues Passwort (mind. 8 Zeichen)<br>
      <input type="password" name="new_password" required minlength="8" style="width:100%;padding:8px;margin:4px 0 16px;">
    </label>
    <button type="submit">Passwort ändern</button>
  </form>
</div>
{% endblock %}
