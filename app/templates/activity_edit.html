{% extends "base.html" %}
{% block content %}
<h2>Aktivität bearbeiten</h2>
<form method="post" class="form-card">
    <label>Name
        <input name="name" value="{{ activity.name or '' }}" required>
    </label>
    <label>Aufwand in Minuten
        <input name="effort_minutes" type="number" step="0.1" value="{{ activity.effort_minutes or 0 }}" required>
    </label>
    <label>Sortierung
        <input name="sort_order" type="number" value="{{ activity.sort_order or 0 }}">
    </label>
    <label>Rechtsgrundlage
        <textarea name="legal_basis">{{ activity.legal_basis or '' }}</textarea>
    </label>
    <fieldset>
        <legend>Ausführende Rollen</legend>
        {% for role in roles %}
            <label class="check">
                <input type="checkbox" name="role_ids" value="{{ role.id }}"
                    {% if role in activity.roles %}checked{% endif %}>
                {{ role.name }}
            </label>
        {% endfor %}
    </fieldset>
    <button type="submit">Speichern</button>
</form>

{% if activity.id %}
<form method="post" action="{{ url_for('activity_delete', activity_id=activity.id) }}">
    <button class="danger" type="submit">Aktivität löschen</button>
</form>
{% endif %}
{% endblock %}
