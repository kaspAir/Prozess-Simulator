{% extends "base.html" %}
{% block content %}
<div style="max-width:900px;margin:0 auto;padding:0 16px;">
  <h2>Alle Accounts (Super-Admin)</h2>
  <table style="width:100%;border-collapse:collapse;">
    <thead><tr style="text-align:left;border-bottom:2px solid #e5e7eb;">
      <th style="padding:6px;">Account</th><th>Mitglieder</th><th>Organisationen</th><th></th>
    </tr></thead>
    <tbody>
    {% for row in rows %}
      <tr style="border-bottom:1px solid #eee;">
        <td style="padding:8px;">{{ row.account.name }}</td>
        <td style="padding:8px;">{{ row.members }}</td>
        <td style="padding:8px;">{{ row.organizations }}</td>
        <td style="padding:8px;">
          <a href="{{ url_for('admin.switch_account', account_id=row.account.id) }}">hineinschauen →</a>
        </td>
      </tr>
    {% else %}
      <tr><td colspan="4" style="padding:8px;color:#999;">Noch keine Accounts.</td></tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
