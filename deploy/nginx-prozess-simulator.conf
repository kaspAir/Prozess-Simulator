# Nginx-Konfiguration fuer den Prozess-Simulator (ditwi.ch)
# NUR fuer einen Root-/VPS-Server noetig. Auf Infomaniak Managed Hosting laeuft
# der Reverse-Proxy/HTTPS ueber das Hosting-Panel (siehe SERVER_SETUP.md).
#
# Speicherpfad: /etc/nginx/sites-available/ditwi
# Symlink:      ln -s /etc/nginx/sites-available/ditwi /etc/nginx/sites-enabled/
# TLS via Certbot:
#   certbot --nginx -d ditwi.ch -d www.ditwi.ch -d test.ditwi.ch -d int.ditwi.ch

# ── Produktion: ditwi.ch (Port 8010) ─────────────────────────────────────
server {
    listen 80;
    server_name ditwi.ch www.ditwi.ch;
    return 301 https://ditwi.ch$request_uri;
}

server {
    listen 443 ssl;
    server_name ditwi.ch www.ditwi.ch;

    ssl_certificate     /etc/letsencrypt/live/ditwi.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ditwi.ch/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://127.0.0.1:8010;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

